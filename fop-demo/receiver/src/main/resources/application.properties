spring.cloud.azure.servicebus.credential.client-id=xxx
spring.cloud.azure.servicebus.credential.client-secret=xxx
spring.cloud.azure.servicebus.profile.tenant-id=xxx
spring.cloud.azure.servicebus.namespace=xxx
asb.topic.name=fop-demo
asb.topic.subscription.name=fop-subscription

#processor behaviour
fop.processor.batchsize=10

#DB related
spring.datasource.username=fop
spring.datasource.password=fop
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=jdbc:h2:./fop-demo;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true

#server
server.port=8081
